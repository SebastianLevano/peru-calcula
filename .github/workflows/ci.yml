name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore PeruCalcula.sln

      - name: Build
        run: dotnet build PeruCalcula.sln --no-restore -c Release

      - name: Test (unit + golden + NetArchTest)
        run: dotnet test PeruCalcula.sln --no-build -c Release --filter "Category!=Integration" --logger "trx;LogFileName=results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: apps/api/**/TestResults/*.xml

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build (prerender/SSG)
        run: npm run build

      - name: Tests unitarios
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

      - name: Accessibility (axe-core)
        run: |
          npm install -g @axe-core/cli serve 2>/dev/null
          npx serve dist/web/browser -p 8080 &
          sleep 3
          npx axe http://localhost:8080 \
            --tags wcag2a,wcag2aa \
            --exit || true
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: angular-dist
          path: apps/web/dist/web/browser
          retention-days: 3

  # ── E2E Playwright (ADR-28) ───────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: apps/web/dist/web/browser

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install serve
        run: npm install -g serve

      - name: Run Playwright tests
        run: CI=true npm run e2e
        env:
          E2E_BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Backup verify (ADR-30) ────────────────────────────────────────────────
  backup-verify:
    name: Backup/DR verify
    runs-on: ubuntu-latest
    needs: backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB:       peru_calcula_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build API
        run: dotnet build apps/api/PeruCalcula.sln -c Release --no-restore || dotnet restore apps/api/PeruCalcula.sln && dotnet build apps/api/PeruCalcula.sln -c Release

      - name: Create DB schema + seed
        working-directory: apps/api
        run: |
          dotnet run --project PeruCalcula.Api/PeruCalcula.Api.csproj -c Release &
          sleep 5
          kill %1 || true
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=peru_calcula_test;Username=postgres;Password=postgres"
          Jwt__Key: "test_key_minimo_32_chars_segura_ok_ci"
          OpenTelemetry__Enabled: "false"

      - name: Make backup
        run: |
          mkdir -p /tmp/backups
          PGPASSWORD=postgres pg_dump \
            -h localhost -U postgres -d peru_calcula_test \
            --format=custom | gzip > /tmp/backups/backup_ci.sql.gz
          echo "Backup size: $(du -sh /tmp/backups/backup_ci.sql.gz)"

      - name: Verify restore
        run: |
          PGPASSWORD=postgres PGHOST=localhost PGUSER=postgres PGPORT=5432 \
          BACKUP_DIR=/tmp/backups \
          sh docker/backup-verify.sh || \
          echo "Verify script requires DB restore — checking backup integrity manually"

          # Verificación manual mínima: el archivo de backup no está vacío
          SIZE=$(stat -c%s /tmp/backups/backup_ci.sql.gz)
          echo "Backup size bytes: ${SIZE}"
          [ "${SIZE}" -gt 1000 ] && echo "OK: backup tiene contenido" || (echo "ERROR: backup vacío" && exit 1)
