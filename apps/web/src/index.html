<!doctype html>
<html lang="es-PE">
<head>
  <meta charset="utf-8">
  <title>Perú Calcula — Calculadoras laborales, tributarias y financieras</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Calcula tu CTS, gratificación, vacaciones, recibos por honorarios, NRUS y créditos según la normativa peruana vigente. Gratis, sin registro y con la fuente legal a la vista.">
  <meta name="theme-color" content="#0a564e">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="index, follow">

  <!-- ════════════════════════════════════════════════════════════════════
       Google Search Console — verificación de propiedad
       Pasos (hacer DESPUÉS del primer deploy, ver docs/DEPLOY.md):
         1. Entrar a https://search.google.com/search-console
         2. Agregar propiedad → tipo "Prefijo de URL" → https://perucalcula.pe
         3. Elegir el método "Etiqueta HTML" → copiar el atributo content="..."
         4. Pegar ese código abajo, descomentar la línea, y volver a desplegar
         5. Pulsar "Verificar" en Search Console
         6. Enviar el sitemap: https://perucalcula.pe/sitemap.xml
       ════════════════════════════════════════════════════════════════════ -->
  <!-- <meta name="google-site-verification" content="REEMPLAZAR_CON_TU_CÓDIGO" /> -->

  <!-- Open Graph / redes -->
  <meta property="og:site_name" content="Perú Calcula">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_PE">
  <meta property="og:title" content="Perú Calcula — Calculadoras laborales, tributarias y financieras">
  <meta property="og:description" content="Cálculos según la normativa peruana vigente, con fuente y fecha a la vista. Gratis y sin registro.">
  <!-- og-image.png: exportar og-image.svg a PNG (1200×630) antes de producción -->
  <meta property="og:image" content="https://perucalcula.pe/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://perucalcula.pe/og-image.png">

  <!-- Preload de fuentes críticas (LCP: Inter para UI, Source Serif 4 para títulos) -->
  <link rel="preload" href="/fonts/inter-latin.woff2"
        as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/fonts/source-serif-4-latin.woff2"
        as="font" type="font/woff2" crossorigin="anonymous">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
