global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # Métricas del OTel Collector (que agrega métricas de la API)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Health check de la API directamente
  - job_name: "peru-calcula-api-health"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
