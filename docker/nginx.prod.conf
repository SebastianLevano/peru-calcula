# ── Compresión global ────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/javascript application/json
           application/xml image/svg+xml font/woff2;
gzip_min_length 1024;

# ── Redirect HTTP → HTTPS (fuerza https + dominio canónico sin www) ───────────
server {
    listen 80;
    server_name perucalcula.pe www.perucalcula.pe;

    # ACME challenge para renovación automática de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Un solo salto: tanto www como apex van a https://perucalcula.pe (sin www)
    location / {
        return 301 https://perucalcula.pe$request_uri;
    }
}

# ── Redirect HTTPS www → HTTPS apex (301 canónico, sin www) ───────────────────
# El certificado cubre www.perucalcula.pe (certbot -d perucalcula.pe -d www.perucalcula.pe),
# por eso este bloque puede terminar TLS para redirigir limpio.
server {
    listen 443 ssl;
    http2 on;
    server_name www.perucalcula.pe;

    ssl_certificate     /etc/letsencrypt/live/perucalcula.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perucalcula.pe/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/perucalcula.pe/chain.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    return 301 https://perucalcula.pe$request_uri;
}

# ── HTTPS principal (dominio canónico) ────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name perucalcula.pe;

    ssl_certificate     /etc/letsencrypt/live/perucalcula.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perucalcula.pe/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/perucalcula.pe/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Health checks (para CI/CD smoke tests y uptime monitors) ────────────
    location /health/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── API backend (.NET) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # ── Sitemap dinámico (API genera URLs con SiteUrl) ───────────────────────
    location = /sitemap.xml {
        proxy_pass         http://api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /robots.txt {
        proxy_pass         http://web:4000;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Assets estáticos: cache larga (Angular los hashea) ──────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        proxy_pass         http://web:4000;
        proxy_set_header   Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid  200 1d;
    }

    # ── Angular SSR (Node.js Express) ────────────────────────────────────────
    location / {
        proxy_pass         http://web:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 30s;
    }
}
