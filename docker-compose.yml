services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       peru_calcula_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT:                     Development
      ConnectionStrings__DefaultConnection:       "Host=db;Database=peru_calcula_dev;Username=postgres;Password=postgres"
      Cors__Origins__0:                           "http://localhost:4200"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "4000:80"
    depends_on:
      - api

volumes:
  pgdata:
