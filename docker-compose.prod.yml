services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── .NET API ────────────────────────────────────────────────────────────────
  api:
    image: ${REGISTRY}/peru-calcula-api:${IMAGE_TAG}
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ASPNETCORE_URLS:                      http://+:8080
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Cors__Origins__0:                     https://perucalcula.pe
      Cors__Origins__1:                     https://www.perucalcula.pe
      Jwt__Key:                             ${JWT_SECRET}
      Jwt__Issuer:                          PeruCalcula
      Jwt__Audience:                        PeruCalcula
      SiteUrl:                              https://perucalcula.pe
      OpenTelemetry__Enabled:               "false"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Angular SSR (Node.js Express) ──────────────────────────────────────────
  web:
    image: ${REGISTRY}/peru-calcula-web:${IMAGE_TAG}
    environment:
      PORT:    4000
      API_URL: http://api:8080   # URL interna para peticiones SSR → API
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ | grep -q 'Perú Calcula' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── nginx: SSL termination + reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - web
      - api

volumes:
  pgdata:
