receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Raspa las métricas Prometheus de la API
  prometheus:
    config:
      scrape_configs:
        - job_name: "peru-calcula-api"
          scrape_interval: 15s
          static_configs:
            - targets: ["api:8080"]
          metrics_path: /metrics

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  # Métricas → Prometheus (pull)
  prometheus:
    endpoint: "0.0.0.0:8888"
    namespace: perucalcula

  # Logs → Loki
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: false
      level: true

  # Debug local (solo dev)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, batch, resource]
      exporters:  [debug]

    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters:  [prometheus]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, batch, resource]
      exporters:  [loki, debug]
