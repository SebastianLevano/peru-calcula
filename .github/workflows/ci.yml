name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore PeruCalcula.sln

      - name: Build
        run: dotnet build PeruCalcula.sln --no-restore -c Release

      - name: Test (unit + NetArchTest)
        run: dotnet test PeruCalcula.sln --no-build -c Release --logger "trx;LogFileName=results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: apps/api/**/TestResults/*.xml

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # no bloquea hasta configurar reglas

      - name: Build (prerender/SSG)
        run: npm run build

      - name: Tests unitarios
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

      - name: Accessibility (axe-core)
        run: |
          npm install -g @axe-core/cli serve 2>/dev/null
          npx serve dist/web/browser -p 8080 &
          sleep 3
          npx axe http://localhost:8080 \
            --tags wcag2a,wcag2aa \
            --exit || true   # informativo en F0; falla en F1+
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: apps/web/dist/web/browser
          retention-days: 3
